<!-- New Password Start -->
<img src="assets/images/png-img/background-img.png" class="background_img" />

<!-- THEME CHANGE -->
<button
  type="button"
  data-theme-toggle
  aria-label="theme"
  class="dark_theme cursor_pointer position-absolute"
>
  theme
</button>

<div
  class="container d-flex align-items-center justify-content-center h-100 py-5 p-0"
>
  <div class="row justify-content-center login_middle_content">
    <div class="col-md-6">
      <img src="assets/images/svg-img/logo.svg" class="img-fluid logo" />
    </div>

    <div class="col-md-6 login_details">
      <div class="login_background">
        <div class="d-flex flex-column login_content">
          <a routerLink="/auth/verify">
            <img
              src="assets/images/svg-img/login-left-arrow.svg"
              width="30"
              height="50"
            />
          </a>

          <div class="login_text">
            <h1 class="Semibold mb-3 Heading">New Password</h1>
            <h2 class="light mb-0 Sub-Heading">
              Enter and confirm your new password.
            </h2>
          </div>

          <!-- ✅ Message box -->
          <div *ngIf="message" class="alert-box" [ngClass]="messageType">
            {{ message }}
          </div>

          <!-- ✅ Password Inputs -->
          <div>
            <input
             [type]="showPassword ? 'text' : 'password'"
              placeholder="New password"
              class="input_field py-3 p-2 mb-3"
              [(ngModel)]="newPassword"
              name="newPassword"
            />
             <img
                src="assets/images/svg-img/eye.svg"
                class="eye_img"
                alt="Toggle Password"
                (click)="togglePassword()"
                style="cursor: pointer;"
              />
            <input
              type="password"
              placeholder="Confirm password"
              class="input_field py-3 p-2 mb-3"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
            />
          </div>

          <!-- ✅ Button -->
          <div>
            <button
              type="button"
              (click)="onSetPassword()"
              class="primary_btn medium-text Medium"
              [disabled]="loading"
            >
              {{ loading ? 'Updating...' : 'Set Password' }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
